version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: app_container

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: web_container
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock