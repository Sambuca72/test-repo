name: Build and Push to Docker Hub

# Запуск при пуше в твою ветку
on:
  push:
    branches: [ "feature/docker-web-hub", "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Стягиваем код из репозитория
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Логинимся в Docker Hub, используя созданные секреты
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Настраиваем Docker Buildx (инструмент для сборки)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 4. Сборка и отправка образа APP
      - name: Build and push App
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/test-repo-app:latest

      # 5. Сборка и отправка образа WEB
      - name: Build and push Web
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/test-repo-web:latest